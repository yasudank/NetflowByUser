# Configuration for netflow fiber assignment and pfsDesign/OPE generation pipeline

# Common/global settings
proposal_id: "S26A-104"
obstime: "2026-05-09T06:00:00Z"

# Input paths
inputs:
  pointing_file: null
  catalog_dir: "./cosmos/"
  science_targets: "targets_all_20260514.csv" # relative to catalog_dir, or absolute
  fluxstd_targets: "fluxstd.ecsv"            # relative to catalog_dir, or absolute
  sky_targets: "sky.ecsv"                    # relative to catalog_dir, or absolute
  gaia_catalog: "./cosmos/gaia.ecsv"
  gaiadb_config: null                        # path to config.toml if using gaiadb for guide stars

# Output paths
outputs:
  targets_dir: "targets"                     # target ECSV output folder (subfolders science/, fluxstd/, sky/ will be created)
  plot_file: "sky_distribution.png"
  text_output: "output.txt"

# Netflow optimization parameters
netflow:
  random_seed: 20
  nvisit: 1
  t_obs: 900.0                              # seconds
  num_fields: 4
  max_priority: 2
  min_stars_per_cam: 2                      # Minimum guide stars required per guide camera
  min_cams_with_stars: 6                    # Minimum number of guide cameras that must meet the min_stars requirement
  collision_distance: 2.0
  elbow_collisions: true
  broken_cobras_margin: 1.0
  sky:
    num_required: 400
    non_observation_cost: 5000
  fluxstd:
    num_required: 100
    non_observation_cost: 5000

# Gurobi solver options
gurobi:
  seed: 0
  presolve: 1
  method: 0
  degenmoves: 0
  heuristics: 0.6
  mipfocus: 0
  mipgap: 0.005
  PreSOS2Encoding: 0
  PreSOS1Encoding: 0
  threads: 4

# PfsDesign and OPE generation parameters
pfs_design:
  science_catalog_id: 10356
  ope_template: "./ope_templates/template_latest.ope"
  exptime_per_frame: 900.0
  n_frames: 4
